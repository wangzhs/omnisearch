services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:8080/

  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-15}
      USER_AGENT: ${USER_AGENT:-OmniSearch/0.1}
      API_PORT: ${API_PORT:-8000}
      SQLITE_DB_PATH: /app/data/omnisearch.db
      RESEARCH_PLANNER: ${RESEARCH_PLANNER:-rule}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      RESEARCH_PLANNER_MODEL: ${RESEARCH_PLANNER_MODEL:-gpt-5}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_BASE_URL: ${TUSHARE_BASE_URL:-}
      CNINFO_ANNOUNCEMENTS_URL: ${CNINFO_ANNOUNCEMENTS_URL:-https://www.cninfo.com.cn/new/hisAnnouncement/query}
      STOCK_DATA_TTL_HOURS: ${STOCK_DATA_TTL_HOURS:-24}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - searxng
